<div class="lg:hidden fixed bottom-0 left-0 right-0 z-50 px-4 pb-6">
  <div
    class="max-w-md mx-auto flex items-center justify-around bg-base-200 rounded-[2rem] h-20 px-4 shadow-[0_20px_60px_rgba(0,0,0,0.5)] border border-base-content/5">
    
    <button class="flex flex-col items-center gap-1 text-base-content/50 hover:text-primary transition-colors" 
            routerLink="/home" routerLinkActive="text-primary" [routerLinkActiveOptions]="{exact: true}">
      <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
      </svg>
      <span class="text-[9px] font-bold uppercase tracking-wide">{{ 'nav.home' | translate }}</span>
    </button>

    <button class="flex flex-col items-center gap-1 text-base-content/50 hover:text-primary transition-colors"
            routerLink="/decks" routerLinkActive="text-primary">
      <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M6 6.878V6a2.25 2.25 0 012.25-2.25h7.5A2.25 2.25 0 0118 6v.878M4.5 9.878v8.25A2.25 2.25 0 006.75 20.25h10.5A2.25 2.25 0 0019.5 18.128V9.878" />
      </svg>
      <span class="text-[9px] font-bold uppercase tracking-wide">{{ 'nav.decks' | translate }}</span>
    </button>

    <!-- Floating Action Button (+) -->
    @if (showFab) {
      <div class="absolute -top-7 left-1/2 -translate-x-1/2">
        <button (click)="onFabClick()" class="w-16 h-16 rounded-full bg-primary
                        shadow-[0_8px_30px_rgba(99,102,241,0.4)]
                        hover:scale-110 active:scale-95 transition-all
                        flex items-center justify-center border-4 border-base-300">
          <svg class="h-8 w-8 text-primary-content" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
          </svg>
        </button>
      </div>
    }

    <button class="flex flex-col items-center gap-1 text-base-content/50 hover:text-primary transition-colors"
            routerLink="/about" routerLinkActive="text-primary">
      <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0zM19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
      </svg>
      <span class="text-[9px] font-bold uppercase tracking-wide">{{ 'nav.about' | translate }}</span>
    </button>

    <button class="flex flex-col items-center gap-1 text-base-content/50 hover:text-primary transition-colors"
            routerLink="/profile" routerLinkActive="text-primary">
      <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
      <span class="text-[9px] font-bold uppercase tracking-wide">{{ 'nav.profile' | translate }}</span>
    </button>

  </div>
</div>
