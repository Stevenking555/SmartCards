<aside
  class="hidden lg:flex flex-col w-56 h-screen min-w-[14rem] bg-base-200 border-r border-base-content/5 px-4 py-7 gap-1 transition-colors duration-300">

  <!-- Logo -->
  <div class="px-3 pb-6 text-[19px] font-extrabold tracking-tight text-base-content cursor-pointer" routerLink="/home">
    {{ 'app.title.smart' | translate }}<span class="text-primary">{{ 'app.title.cards' | translate }}</span>
  </div>

  <!-- Nav label -->
  <p class="px-3 text-[10px] font-bold uppercase tracking-widest text-base-content/40 mb-1">
    {{ 'nav.menu' | translate }}</p>

  <button class="sidebar-nav-item hover:cursor-pointer" routerLink="/home" routerLinkActive="active">
    <svg class="w-[18px] h-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
    </svg>
    {{ 'nav.home' | translate }}
  </button>

  <button class="sidebar-nav-item hover:cursor-pointer" routerLink="/decks" routerLinkActive="active">
    <svg class="w-[18px] h-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M6 6.878V6a2.25 2.25 0 012.25-2.25h7.5A2.25 2.25 0 0118 6v.878M4.5 9.878v8.25A2.25 2.25 0 006.75 20.25h10.5A2.25 2.25 0 0019.5 18.128V9.878" />
    </svg>
    {{ 'nav.decks' | translate }}
  </button>

  <button class="sidebar-nav-item hover:cursor-pointer" routerLink="/about" routerLinkActive="active">
    <svg class=" w-[18px] h-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0zM19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
    </svg>
    {{ 'nav.about' | translate }}
  </button>

  <button class="sidebar-nav-item hover:cursor-pointer" routerLink="/profile" routerLinkActive="active">
    <svg class="w-[18px] h-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z" />
    </svg>
    {{ 'nav.profile' | translate }}
  </button>

</aside>
