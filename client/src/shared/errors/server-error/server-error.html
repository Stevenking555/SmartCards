<div
  class="flex min-h-screen bg-base-300 text-base-content items-center justify-center p-6 transition-colors duration-300">
  <div
    class="max-w-3xl w-full space-y-8 bg-base-200 p-8 md:p-12 rounded-[2.5rem] shadow-xl border border-error/20 relative overflow-hidden">

    <div class="absolute top-0 left-0 w-full h-2 bg-error"></div>

    <div class="text-center space-y-4">
      <div class="w-20 h-20 rounded-full bg-error/10 text-error flex items-center justify-center mx-auto mb-6">
        <svg class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
      </div>
      <h1 class="text-3xl font-black text-error tracking-tight">500 - Server error</h1>
      <p class="text-base-content/70 font-medium">An internal server error has occurred. Please, try again later!</p>
    </div>

    @if (error) {
    <div class="mt-8">
      <h5 class="text-error font-bold mb-2">Error Message: (only for developers):</h5>
      <div class="bg-base-300 rounded-2xl p-4 overflow-x-auto border border-error/10">
        <p class="font-mono text-error/80 text-sm whitespace-pre-wrap">{{ error.message }}</p>
      </div>

      @if (error.details) {
      <div class="bg-base-300 rounded-2xl p-4 mt-4 overflow-x-auto border border-base-content/5">
        <p class="font-mono text-base-content/60 text-xs whitespace-pre-wrap">{{ error.details }}</p>
      </div>
      }
    </div>
    }

    <div class="pt-6 text-center">
      <button routerLink="/" class="btn btn-outline rounded-2xl hover:bg-base-content/10 border-base-content/20 px-8">
        Back to the login/home page
      </button>
    </div>

  </div>
</div>
