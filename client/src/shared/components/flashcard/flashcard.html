<div (click)="onView()"
  class="group relative bg-base-100 border border-base-content/10 hover:border-primary/50 text-base-content rounded-2xl p-5 shadow-sm hover:shadow-md transition-all h-[13rem] flex flex-col justify-between cursor-pointer">

  @if (isMastered) {
  <div class="absolute top-3 left-3 z-20">
    <div
      class="flex items-center gap-1.5 px-2.5 py-1 rounded-lg bg-amber-400/10 backdrop-blur-md border border-amber-400/20 text-amber-500 shadow-sm transition-all group-hover:bg-amber-400/20 group-hover:border-amber-400/30">
      <svg class="w-3 h-3 fill-amber-500" viewBox="0 0 24 24">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
      </svg>
      <span class="text-[10px] font-bold uppercase tracking-widest">{{ 'deck_detail.mastered' | translate }}</span>
    </div>
  </div>
  }

  <div class="flex-1 flex flex-col items-center justify-center text-center overflow-hidden">
    <p class="text-[10px] font-bold uppercase text-base-content/50 mb-1 tracking-wider">
      {{ 'deck_detail.question' | translate }}</p>
    <p class="text-sm font-semibold text-primary line-clamp-3 break-all w-full">{{ card.question }}</p>
  </div>
  <div class="border-t border-base-content/10 pt-3 text-center overflow-hidden">
    <p class="text-[10px] font-bold uppercase text-base-content/50 mb-1 tracking-wider">
      {{ 'deck_detail.answer' | translate }}</p>
    <p class="text-secondary text-sm font-medium line-clamp-2 break-all w-full">{{ card.answer }}</p>
  </div>

  <!-- Edit button -->
  <button (click)="onEdit($event)" title="{{ 'action.edit' | translate }}"
    class="absolute top-3 right-12 w-7 h-7 rounded-full bg-info/20 text-info flex items-center justify-center hover:bg-info hover:text-info-content transition-colors opacity-0 group-hover:opacity-100 z-10">
    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
    </svg>
  </button>

  <!-- Delete button -->
  <button (click)="delete($event)" title="{{ 'action.delete' | translate }}"
    class="absolute top-3 right-3 w-7 h-7 rounded-full bg-error/20 text-error flex items-center justify-center hover:bg-error hover:text-error-content transition-colors opacity-0 group-hover:opacity-100 z-10">
    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
    </svg>
  </button>

</div>
