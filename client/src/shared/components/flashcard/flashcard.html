<div
  class="group relative bg-base-100 border border-base-content/10 hover:border-primary/50 text-base-content rounded-2xl p-5 shadow-sm hover:shadow-md transition-all h-[13rem] flex flex-col justify-between">

  @if (!isEditing()) {
  <div>
    <p class="text-[10px] font-bold uppercase text-base-content/50 mb-1 tracking-wider">
      {{ 'deck_detail.question' | translate }}</p>
    <p class="text-sm font-medium line-clamp-2">{{ card.question }}</p>
  </div>
  <div class="border-t border-base-content/10 pt-3">
    <p class="text-[10px] font-bold uppercase text-base-content/50 mb-1 tracking-wider">
      {{ 'deck_detail.answer' | translate }}</p>
    <p class="text-primary/80 text-sm font-medium line-clamp-2">{{ card.answer }}</p>
  </div>

  <!-- Edit button -->
  <button (click)="startEdit($event)" title="{{ 'action.edit' | translate }}"
    class="absolute top-3 right-12 w-7 h-7 rounded-full bg-info/20 text-info flex items-center justify-center hover:bg-info hover:text-info-content transition-colors opacity-0 group-hover:opacity-100 z-10">
    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
    </svg>
  </button>

  <!-- Delete button -->
  <button (click)="delete($event)" title="{{ 'action.delete' | translate }}"
    class="absolute top-3 right-3 w-7 h-7 rounded-full bg-error/20 text-error flex items-center justify-center hover:bg-error hover:text-error-content transition-colors opacity-0 group-hover:opacity-100 z-10">
    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
    </svg>
  </button>

  } @else {
  <!-- Edit mode -->
  <div class="flex-1 flex flex-col gap-2 relative z-20" (click)="$event.stopPropagation()">

    <textarea [(ngModel)]="editQuestion" [placeholder]="'deck_detail.question' | translate"
      class="textarea textarea-xs textarea-bordered w-full resize-none h-14 bg-base-200 border-base-content/20 focus:border-primary leading-tight text-base-content">
      </textarea>

    <textarea [(ngModel)]="editAnswer" [placeholder]="'deck_detail.answer' | translate"
      class="textarea textarea-xs textarea-bordered w-full resize-none h-14 bg-base-200 border-base-content/20 focus:border-primary leading-tight text-base-content">
      </textarea>

    <div class="flex gap-2 mt-auto">
      <button (click)="save($event)" class="btn btn-xs rounded-lg btn-primary flex-1">
        {{ 'action.save' | translate }}
      </button>
      <button (click)="cancelEdit($event)" class="btn btn-xs rounded-lg btn-ghost flex-1">
        {{ 'action.cancel' | translate }}
      </button>
    </div>
  </div>
  }
</div>
