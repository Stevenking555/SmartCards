<div class="relative inline-block">
  <button
    class="w-9 h-9 rounded-xl bg-base-content/5 hover:bg-base-content/10 cursor-pointer border border-base-content/5 flex items-center justify-center text-base-content/60 hover:text-base-content transition-all active:scale-95"
    (click)="toggleDropdown()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-5">
      <path fill-rule="evenodd"
        d="M9 2.25a.75.75 0 0 1 .75.75v1.506a49.384 49.384 0 0 1 5.343.371.75.75 0 1 1-.186 1.489c-.66-.083-1.323-.151-1.99-.206a18.67 18.67 0 0 1-2.97 6.323c.318.384.65.753 1 1.107a.75.75 0 0 1-1.07 1.052A18.902 18.902 0 0 1 9 13.687a18.823 18.823 0 0 1-5.656 4.482.75.75 0 0 1-.688-1.333 17.323 17.323 0 0 0 5.396-4.353A18.72 18.72 0 0 1 5.89 8.598a.75.75 0 0 1 1.388-.568A17.21 17.21 0 0 0 9 11.224a17.168 17.168 0 0 0 2.391-5.165 48.04 48.04 0 0 0-8.298.307.75.75 0 0 1-.186-1.489 49.159 49.159 0 0 1 5.343-.371V3A.75.75 0 0 1 9 2.25ZM15.75 9a.75.75 0 0 1 .68.433l5.25 11.25a.75.75 0 1 1-1.36.634l-1.198-2.567h-6.744l-1.198 2.567a.75.75 0 0 1-1.36-.634l5.25-11.25A.75.75 0 0 1 15.75 9Zm-2.672 8.25h5.344l-2.672-5.726-2.672 5.726Z"
        clip-rule="evenodd" />
    </svg>
  </button>

  <!-- Backdrop to close on click outside -->
  <div *ngIf="isDropdownOpen()" class="fixed inset-0 z-40" (click)="isDropdownOpen.set(false)"></div>

  <div *ngIf="isDropdownOpen()"
    class="absolute right-0 mt-2 w-48 origin-top-right rounded-2xl bg-base-200 border border-base-content/10 shadow-2xl z-50 overflow-hidden animate-in fade-in zoom-in duration-200">
    <div class="p-2 flex flex-col gap-1">
      <!-- English -->
      <button (click)="onLanguageChange('en')"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl transition-colors w-full text-left"
        [ngClass]="currentLang === 'en' ? 'bg-primary/10 text-primary font-bold' : 'hover:bg-base-content/5 text-base-content/70'">
        <span class="text-sm">{{ 'profile.language.en' | translate }}</span>
      </button>

      <!-- Hungarian -->
      <button (click)="onLanguageChange('hu')"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl transition-colors w-full text-left"
        [ngClass]="currentLang === 'hu' ? 'bg-primary/10 text-primary font-bold' : 'hover:bg-base-content/5 text-base-content/70'">
        <span class="text-sm">{{ 'profile.language.hu' | translate }}</span>
      </button>
    </div>
  </div>
</div>
