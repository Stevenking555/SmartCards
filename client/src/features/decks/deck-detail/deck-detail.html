<div class="flex h-screen bg-base-300 overflow-hidden text-base-content transition-colors duration-300">

  <app-sidebar></app-sidebar>

  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Mobile header -->
    <header class="flex lg:hidden justify-between items-center p-4 bg-base-200/50 backdrop-blur-md
    shadow-md border-b border-base-content/5 relative z-10 transition-colors duration-300">
      <div class="flex items-center gap-3">
        <button class="w-10 h-10 flex items-center justify-center rounded-xl bg-base-content/5
        hover:bg-base-content/10 transition-colors text-base-content" routerLink="/decks">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
          </svg>
        </button>
        <div *ngIf="!isEditingTitle()">
          <p class="text-[10px] font-bold uppercase text-base-content/60 tracking-widest leading-none mb-1">
            {{ 'deck_detail.title_prefix' | translate }}</p>
          <div class="flex items-center gap-2 mt-1">
            <h1 class="text-base font-black text-base-content tracking-tight leading-none">{{ deck?.title }}</h1>
            <button (click)="startEditTitle()" class="text-base-content/60 hover:text-primary transition-colors">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
              </svg>
            </button>
          </div>
        </div>
        <div *ngIf="isEditingTitle()" class="flex flex-col gap-1 items-start">
          <input type="text" [(ngModel)]="editTitleValue" class="input input-sm input-bordered bg-base-200
          focus:border-primary font-bold text-base w-40" />
          <div class="flex gap-1 w-full">
            <button (click)="saveTitle()" class="btn btn-xs btn-primary">{{ 'action.save' | translate }}</button>
            <button (click)="cancelEditTitle()" class="btn btn-xs btn-ghost">{{ 'action.cancel' | translate }}</button>
          </div>
        </div>
      </div>
      <button routerLink="game"
        class="flex items-center gap-2 px-3 py-2 bg-success hover:bg-success/80
      rounded-xl text-success-content text-sm font-bold transition-colors shadow-lg shadow-success/20 border border-success/20">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        {{ 'deck_detail.study' | translate }}
      </button>
    </header>

    <!-- Scrollable content -->
    <main class="flex-1 overflow-y-auto p-4 lg:p-7">

      <!-- Desktop top bar -->
      <div class="hidden lg:flex justify-between items-center mb-8">
        <div class="flex items-center gap-4">
          <button routerLink="/decks" class="w-10 h-10 rounded-xl bg-base-content/5 hover:bg-base-content/10
          flex items-center justify-center text-base-content/60 hover:text-base-content transition-colors
          border border-base-content/5">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
          </button>
          <div *ngIf="!isEditingTitle()">
            <p class="text-[11px] font-bold uppercase tracking-widest text-base-content/50">
              {{ 'deck_detail.desktop_title_prefix' | translate }}</p>
            <div class="flex items-center gap-3">
              <h1 class="text-3xl font-black text-base-content tracking-tight">{{ deck?.title }}</h1>
              <button (click)="startEditTitle()" title="{{ 'action.edit' | translate }}" class="w-8 h-8 rounded-lg
              bg-base-content/5 hover:bg-base-content/10 flex items-center justify-center text-base-content/60
              hover:text-primary transition-colors">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                </svg>
              </button>
            </div>
          </div>
          <div *ngIf="isEditingTitle()" class="flex items-center gap-2">
            <input type="text" [(ngModel)]="editTitleValue" class="input input-bordered input-md bg-base-200
            focus:border-primary border border-base-content/10 font-bold text-xl min-w-[300px]" />
            <button (click)="saveTitle()" class="btn btn-sm btn-primary">{{ 'action.save' | translate }}</button>
            <button (click)="cancelEditTitle()" class="btn btn-sm btn-ghost">{{ 'action.cancel' | translate }}</button>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <button (click)="openModal()"
            class="flex items-center gap-2 px-4 py-2 bg-primary
          hover:bg-primary/80 rounded-xl text-primary-content text-sm font-semibold transition-colors border border-primary/20">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
            </svg>
            {{ 'deck_detail.add_card' | translate }}
          </button>
          <button routerLink="game"
            class="flex items-center gap-2 px-4 py-2 bg-success
          hover:bg-success/80 rounded-xl text-success-content text-sm font-semibold transition-colors border border-success/20">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            {{ 'deck_detail.study_now' | translate }}
          </button>
        </div>
      </div>

      <!-- Card-List -->
      <div class="max-w-5xl mx-auto lg:mx-0 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        @for (card of deck?.cards; track card.id) {
        <app-flashcard [card]="card" (saveCard)="onUpdateCard(card.id, $event)" (deleteCard)="onDeleteCard(card.id)">
        </app-flashcard>
        }

        <!-- Add card "placeholder" -->
        <button (click)="openModal()" class="bg-transparent border-2 border-dashed border-base-content/10
        hover:border-primary/50 rounded-2xl p-5 h-48 flex flex-col items-center justify-center text-base-content/50
        hover:text-primary transition-colors group cursor-pointer">
          <div class="w-12 h-12 rounded-full bg-base-content/5 group-hover:bg-primary/20 flex items-center
          justify-center mb-3 transition-colors">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
            </svg>
          </div>
          <p class="font-bold">{{ 'deck_detail.add_new_card' | translate }}</p>
        </button>
      </div>

    </main>

    <app-bottom-nav [showFab]="true" (fabClick)="openModal()"></app-bottom-nav>

  </div>
</div>

<!-- Create card Modal -->
<div class="modal" [class.modal-open]="isModalOpen()">
  <div
    class="modal-box bg-base-100 text-base-content border border-base-content/10 max-w-sm rounded-[2.5rem] p-8 shadow-xl">
    <div class="flex justify-between items-center mb-8">

      <button (click)="closeModal()" class="btn btn-ghost btn-sm text-primary">✕
        {{ 'deck_detail.modal.cancel' | translate }}
      </button>

      <h3 class="font-bold text-lg text-base-content">{{ 'deck_detail.modal.title' | translate }}</h3>
      <div class="w-16"></div>
    </div>

    <div class="space-y-6">
      <div>
        <label class="block text-[10px] font-bold uppercase text-base-content/50 mb-2">
          {{ 'deck_detail.modal.front' | translate }}
        </label>

        <textarea [(ngModel)]="newCard.question" [placeholder]="'deck_detail.modal.front_placeholder' | translate"
          rows="3" class="textarea textarea-bordered w-full bg-base-200 border-base-content/20
          focus:border-primary rounded-2xl text-base-content resize-none">
        </textarea>
      </div>

      <div>
        <label class="block text-[10px] font-bold uppercase text-base-content/50 mb-2">
          {{ 'deck_detail.modal.back' | translate }}
        </label>

        <textarea [(ngModel)]="newCard.answer" [placeholder]="'deck_detail.modal.back_placeholder' | translate" rows="3"
          class="textarea textarea-bordered w-full bg-base-200 border-base-content/20
          focus:border-primary rounded-2xl text-base-content resize-none">
        </textarea>
      </div>

      <button (click)="onCreateCard()" class="btn btn-primary w-full rounded-2xl border-none text-base
      hover:bg-primary/80 transition-colors text-primary-content">
        {{ 'deck_detail.modal.save_btn' | translate }}
      </button>
    </div>
  </div>
  <div class="modal-backdrop bg-neutral/80" (click)="closeModal()"></div>
</div>
