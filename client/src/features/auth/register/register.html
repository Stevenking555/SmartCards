<div class="flex min-h-screen flex-col justify-center px-6 py-12 lg:px-8 bg-base-300 text-base-content transition-colors duration-300">

  <div class="sm:mx-auto sm:w-full sm:max-w-sm">
    <img src="SmartCardsIconOrange.png" alt="SmartCards" class="mx-auto h-20 w-auto" />
    <h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-orange-600">Create your account</h2>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">

    <form [formGroup]="registerForm" (ngSubmit)="register()" class="space-y-5" autocomplete="off">
      <app-text-input formControlName="email" type="email" label="Email address" placeholder="example@email.com"></app-text-input>

      <app-text-input formControlName="displayName" type="text" label="Display Name" placeholder="Enter your display name"></app-text-input>

      <app-text-input formControlName="password" type="password" label="Password" placeholder="Example password"></app-text-input>

      <div>
        <button type="submit"
        class="flex w-full cursor-pointer justify-center rounded-md
        bg-orange-600 px-3 py-1.5 text-sm/6 font-semibold
        text-white hover:bg-orange-700 focus-visible:outline-2
        focus-visible:outline-offset-2 focus-visible:outline-orange-600">
        Register</button>
      </div>

    </form>

    <div class="text-center mt-4">
      <a (click)="cancel()" class="text-sm text-base-content/60 hover:text-orange-600 cursor-pointer">Just remembered your password? Log In here ;D</a>
    </div>

  </div>
</div>
