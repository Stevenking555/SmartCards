<div class="flex min-h-full flex-col justify-center px-10 py-12 lg:px-8">

    <div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">

  <div class="sm:mx-auto sm:w-full sm:max-w-sm">
    <img src="SmartCardsIconLime.png" alt="SmartCards" class="mx-auto h-20 w-auto" />
    <h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-white">Reset your password</h2>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
    <form (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label for="email" class="block text-sm/6 font-medium text-gray-100">Email address</label>
        <div class="mt-2">
          <input type="email" [(ngModel)]="email" name="email" placeholder="example@email.com"
          class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1
          outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-lime-500
          sm:text-sm/6" />
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between">
          <div class="text-sm">
            <a routerLink="/login" class="font-semibold text-lime-500 hover:text-lime-500">Just remembered to your password?</a>
          </div>
        </div>

      </div>

      <div>
        <button type="submit" class="flex w-full justify-center rounded-md bg-lime-500 px-3 py-1.5
        text-sm/6 font-semibold text-white hover:bg-lime-500 focus-visible:outline-2 focus-visible:outline-offset-2
        focus-visible:outline-orange-500">Send the reset link</button>
      </div>

    </form>

    <div class="text-center mt-4">
      <a routerLink="/register" class="text-sm text-gray-500 hover:text-lime-500">Just create a new account ;D</a>
    </div>

  </div>
</div>
