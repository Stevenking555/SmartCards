<div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">

    <div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">

  <div class="sm:mx-auto sm:w-full sm:max-w-sm">
    <img src="SmartcardsIconBlue.png" alt="SmartCards" class="mx-auto h-20 w-auto" />
    <h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-white">Sign in to your account</h2>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
    <form (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label for="email" class="block text-sm/6 font-medium text-gray-100">Email address</label>
        <div class="mt-2">
          <input type="email" [(ngModel)]="currentuser.email" name="email" placeholder="example@email.com"
          class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1
          outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500
          sm:text-sm/6" />
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between">
          <label for="password" class="block text-sm/6 font-medium text-gray-100">Password</label>
          <div class="text-sm">
            <a routerLink="/forgot-password" class="font-semibold text-indigo-400 hover:text-indigo-300">Forgot password?</a>
          </div>
        </div>

        <div class="mt-2">
          <input type="password" [(ngModel)]="currentuser.password" name="password" placeholder="Example password"
          class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1
          outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500
          sm:text-sm/6" />
        </div>

      </div>

      <div>
        <button type="submit" class="flex w-full justify-center rounded-md bg-indigo-500 px-3 py-1.5 text-sm/6 font-semibold text-white hover:bg-indigo-400 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500">Sign in</button>
      </div>

    </form>

    <div class="text-center mt-4">
      <a routerLink="/register" class="text-sm text-gray-500 hover:text-indigo-600">Register</a>
    </div>

  </div>
</div>

<button type="button" routerLink="/home" class="flex max-w-2xs justify-center rounded-md
bg-gray-500 px-3 py-1.5 text-sm/6 font-semibold text-white hover:bg-gray-400 focus-visible:outline-2
focus-visible:outline-offset-2 focus-visible:outline-gray-500">sneakyHomebutton</button>
