<div class="flex min-h-full flex-col justify-center px-10 py-12 lg:px-8">

    <div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">

  <div class="sm:mx-auto sm:w-full sm:max-w-sm">
    <img src="SmartCardsIconOrange.png" alt="SmartCards" class="mx-auto h-20 w-auto" />
    <h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-white">Create your account</h2>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
    <form (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label for="email" class="block text-sm/6 font-medium text-gray-100">Email address</label>
        <div class="mt-2">
          <input type="email" [(ngModel)]="email" name="email" placeholder="example@email.com"
          class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1
          outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-orange-600
          sm:text-sm/6" />
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between">
          <label for="password" class="block text-sm/6 font-medium text-gray-100">Password</label>
          <div class="text-sm">
            <a routerLink="/forgot-password" class="font-semibold text-orange-600 hover:text-orange-600">Forgot password?</a>
          </div>
        </div>

        <div class="mt-2">
          <input type="password" [(ngModel)]="password" name="password" placeholder="Example password"
          class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1
          outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-orange-600
          sm:text-sm/6" />
        </div>

        <div class="mt-2">
          <input type="password" [(ngModel)]="passwordAgain" name="passwordAgain" placeholder="Confirm your password"
          class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1
          outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-orange-600
          sm:text-sm/6" />
        </div>

      </div>

      <div>
        <button type="submit" class="flex w-full justify-center rounded-md bg-orange-600 px-3 py-1.5 text-sm/6 font-semibold text-white hover:bg-orange-600 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-orange-500">Sign in</button>
      </div>

    </form>

    <div class="text-center mt-4">
      <a routerLink="/login" class="text-sm text-gray-500 hover:text-orange-600">Already have an account? Log In</a>
    </div>

  </div>
</div>
