@if (busyService.busyRequestCount() > 0) {
  <div class="fixed inset-0 z-[9999] flex items-center justify-center bg-base-300/60 backdrop-blur-[2px] transition-all duration-300">
    <div class="flex flex-col items-center gap-4">
      <span class="loading loading-spinner loading-lg text-primary scale-150"></span>
      <p class="text-primary font-bold animate-pulse tracking-widest uppercase text-xs">Loading</p>
    </div>
  </div>
}
