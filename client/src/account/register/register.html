<div class="flex min-h-screen flex-col justify-center px-6 py-12 lg:px-8 bg-base-300 text-base-content transition-colors duration-300">

  <div class="sm:mx-auto sm:w-full sm:max-w-sm">
    <img src="SmartCardsIconOrange.png" alt="SmartCards" class="mx-auto h-20 w-auto" />
    <h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-orange-600">Create your account</h2>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
    <form #registerform="ngForm" (ngSubmit)="register()" class="space-y-5">
      <div>
        <label for="email" class="block text-sm/6 font-medium text-base-content/80">Email address</label>
        <div class="mt-2">
          <input type="email"
          [(ngModel)]="creds.email"
          name="email"
          placeholder="example@email.com"

          class="block w-full rounded-md bg-base-200 px-3 py-1.5 text-base text-base-content outline-1 -outline-offset-1
          outline-base-content/20 placeholder:text-base-content/50 focus:outline-2 focus:-outline-offset-2 focus:outline-orange-600
          sm:text-sm/6" />
        </div>
      </div>

      <div>
        <div class="mt-2">
          <label for="displayName" class="block text-sm/6 font-medium text-base-content/80 mb-2">Display Name</label>
          <input type="text"
          [(ngModel)]="creds.displayName"
          name="displayName"
          placeholder="Enter your display name"

          class="block w-full rounded-md bg-base-200 px-3 py-1.5 text-base text-base-content outline-1 -outline-offset-1
          outline-base-content/20 placeholder:text-base-content/50 focus:outline-2 focus:-outline-offset-2 focus:outline-orange-600
          sm:text-sm/6" />
        </div>


        <div class="mt-2">
          <label for="password" class="block text-sm/6 font-medium text-base-content/80 mb-2">Password</label>
          <input type="password"
          [(ngModel)]="creds.password"
          name="password"
          placeholder="Example password"

          class="block w-full rounded-md bg-base-200 px-3 py-1.5 text-base text-base-content outline-1 -outline-offset-1
          outline-base-content/20 placeholder:text-base-content/50 focus:outline-2 focus:-outline-offset-2 focus:outline-orange-600
          sm:text-sm/6" />
        </div>
      </div>

      <div>
        <button type="submit"
        class="flex w-full cursor-pointer justify-center rounded-md
        bg-orange-600 px-3 py-1.5 text-sm/6 font-semibold
        text-white hover:bg-orange-700 focus-visible:outline-2
        focus-visible:outline-offset-2 focus-visible:outline-orange-600">
        Register</button>
      </div>

    </form>

    <div class="text-center mt-4">
      <a (click)="cancel()" class="text-sm text-base-content/60 hover:text-orange-600 cursor-pointer">Just remembered to your password?  Log In here ;D</a>
    </div>

  </div>
</div>
